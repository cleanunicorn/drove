name: Install

on:
  pull_request:
  push:
    branches: [main]

jobs:
  install:
    name: Install script smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Check install script syntax
        run: bash -n install.sh

      - name: Run install script from checkout
        env:
          HOME: ${{ runner.temp }}/drove-home
          UV_PYTHON_PREFERENCE: only-managed
        run: ./install.sh "$PWD"

      - name: Smoke test installed CLI
        env:
          HOME: ${{ runner.temp }}/drove-home
        run: |
          set -euo pipefail
          DROVE_BIN="$(uv tool dir --bin)/drove"
          "${DROVE_BIN}" --help
          "${DROVE_BIN}" config
          "${DROVE_BIN}" init --force
          "${DROVE_BIN}" models list
